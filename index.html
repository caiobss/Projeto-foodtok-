<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOODTOK</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white font-sans antialiased select-none">

    <div class="logo">
        <div class="logo_content">
            <img class="logo_img" src="/assets/burger-solid-full.svg" ">
            <h1>FoodTok</h1>
            <img src="/assets/image.webp" alt="">
        </div>
    </div>


    <main id="feed" class="feed-container w-full max-w-md mx-auto relative bg-black shadow-2xl">
  
        <div class="flex items-center justify-center h-full">
            <p class="text-gray-400 animate-pulse">Carregando receitas...</p>
        </div>
    </main>


    <script src="script.js"></script>
</body>
</html>
